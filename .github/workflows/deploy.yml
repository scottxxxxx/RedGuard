name: Build and Deploy to GCP

# Run this workflow whenever code is pushed to the main branch
on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  PROJECT_ID: weirtech-shared-infra
  GAR_LOCATION: us-central1
  SERVICE: redguard-server
  REGION: us-central1
  # This API_URL is used by the frontend to make requests. 
  # Nginx Proxy Manager will route redguard.scottguida.com/api directly to the backend server.
  API_URL: https://redguard.scottguida.com/api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      packages: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase Repo Name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      # ------------------------------------------------------------------
      # 1. Login to GitHub Container Registry (GHCR)
      # ------------------------------------------------------------------
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        run: |
          VERSION=$(grep '"version":' server/package.json | head -n 1 | awk -F '"' '{print $4}')
          echo "TAG_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      # ------------------------------------------------------------------
      # 2. Build and Push Docker Images
      # ------------------------------------------------------------------
      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/server:latest
            ghcr.io/${{ env.REPO_LC }}/server:${{ env.TAG_VERSION }}

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/client:latest
            ghcr.io/${{ env.REPO_LC }}/client:${{ env.TAG_VERSION }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.API_URL }}

      # ------------------------------------------------------------------
      # 3. Deploy to GCP Compute Engine via SSH
      # ------------------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          passphrase: ${{ secrets.GCP_SSH_PASSPHRASE }}
          timeout: 30m
          command_timeout: 30m
          script: |
            # ------------------------------------------------------------------
            # STEP 0: STOP ONLY REDGUARD CONTAINERS (safe — no other services affected)
            # ------------------------------------------------------------------
            echo "Starting pre-deployment cleanup..."
            sudo docker stop redguard_server redguard_client 2>/dev/null || true
            sudo docker rm -f redguard_server redguard_client 2>/dev/null || true
            # Remove only dangling images to free space (keeps other services intact)
            sudo docker image prune -f
            echo "Cleanup complete. Disk Usage:"
            df -h

            # ------------------------------------------------------------------
            # STEP 1: Login to GHCR
            # ------------------------------------------------------------------
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Create/Update the docker-compose.prod.yml on the server
            cat <<EOF | sudo tee docker-compose.prod.yml > /dev/null
            version: '3.8'
            services:

              server:
                image: ghcr.io/${{ env.REPO_LC }}/server:latest
                container_name: redguard_server
                restart: unless-stopped
                expose:
                  - "3001"
                environment:
                  - NODE_ENV=production
                  - PORT=3001
                  - DATABASE_URL=file:/data/prod.db
                volumes:
                  - redguard_data:/data
                networks:
                  - proxy-tier

              client:
                image: ghcr.io/${{ env.REPO_LC }}/client:latest
                container_name: redguard_client
                restart: unless-stopped
                expose:
                  - "3000"
                environment:
                  - NODE_ENV=production
                  - NEXT_PUBLIC_API_URL=https://redguard.scottguida.com/api
                  - NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
                  - NEXTAUTH_URL=https://redguard.scottguida.com
                  - GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
                  - GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
                depends_on:
                  - server
                networks:
                  - proxy-tier

            networks:
              proxy-tier:
                external: true

            volumes:
              redguard_data:
            EOF

            # Pull latest images and restart (only RedGuard)
            sudo docker compose -f docker-compose.prod.yml pull
            sudo docker compose -f docker-compose.prod.yml up -d
